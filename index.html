    :root {
      --bg: #F0F4F8;
      --surface: #FFFFFF;
      --border: #E2E8F0;
      --text1: #1A202C;
      --text2: #4A5568;
      --text3: #718096;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text1);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .site-header {
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 60%, #1a3a5c 100%);
      padding: 36px 24px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 300px; height: 300px;
      background: rgba(99,102,241,0.15);
      border-radius: 50%;
    }
    .site-header::after {
      content: '';
      position: absolute;
      bottom: -80px; right: -40px;
      width: 250px; height: 250px;
      background: rgba(16,185,129,0.10);
      border-radius: 50%;
    }
    .header-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
    .cert-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(99,102,241,0.25);
      border: 1px solid rgba(99,102,241,0.5);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px; font-weight: 600; letter-spacing: 1px;
      color: #A5B4FC;
      margin-bottom: 14px;
    }
    .cert-badge span { font-size: 14px; }
    .site-header h1 {
      font-size: 26px; font-weight: 800; color: #FFFFFF;
      line-height: 1.3; margin-bottom: 6px;
    }
    .site-header h1 em { color: #60A5FA; font-style: normal; }
    .site-header .subtitle {
      font-size: 13px; color: rgba(255,255,255,0.55);
      margin-bottom: 28px;
    }
    .overall-progress { max-width: 380px; margin: 0 auto; }
    .prog-labels {
      display: flex; justify-content: space-between;
      font-size: 12px; color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
    }
    .prog-labels strong { color: #60A5FA; font-weight: 700; }
    .prog-bar-bg {
      background: rgba(255,255,255,0.15);
      border-radius: 10px; height: 10px; overflow: hidden;
    }
    .prog-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #60A5FA 0%, #34D399 100%);
      border-radius: 10px;
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }

    /* ── STATS ── */
    .main-content { max-width: 1100px; margin: 0 auto; padding: 28px 20px 48px; }
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface); border-radius: var(--radius-md);
      padding: 18px 14px; text-align: center;
      box-shadow: var(--shadow-sm);
      border-top: 3px solid transparent;
    }
    .stat-card:nth-child(1) { border-top-color: #60A5FA; }
    .stat-card:nth-child(2) { border-top-color: #34D399; }
    .stat-card:nth-child(3) { border-top-color: #F59E0B; }
    .stat-num { font-size: 30px; font-weight: 800; color: var(--text1); }
    .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; font-weight: 500; }

    /* ── GROUPS GRID ── */
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
    }
    @media (max-width: 720px) {
      .groups-grid { grid-template-columns: 1fr; }
      .stats-row .stat-num { font-size: 22px; }
    }

    /* ── GROUP CARD ── */
    .group-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }
    .group-header {
      padding: 18px 20px 16px;
      display: flex; align-items: center; gap: 14px;
      position: relative; overflow: hidden;
    }
    .group-header .bg-stripe {
      position: absolute; inset: 0;
      opacity: 0.08;
    }
    .group-icon-wrap {
      width: 46px; height: 46px;
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
      flex-shrink: 0; z-index: 1;
    }
    .group-title-area { flex: 1; z-index: 1; }
    .group-subject-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
      opacity: 0.75; margin-bottom: 2px;
    }
    .group-title-area h2 {
      font-size: 15px; font-weight: 700;
      line-height: 1.35;
    }
    .group-ring-wrap { z-index: 1; flex-shrink: 0; }
    .ring-container {
      position: relative; width: 58px; height: 58px;
    }
    .ring-container svg { display: block; }
    .ring-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      color: var(--text1);
    }

    /* ── GROUP BODY ── */
    .group-body { padding: 10px 14px 14px; }
    .chapter-divider {
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      color: var(--text3); text-transform: uppercase;
      border-top: 1px solid var(--border);
      padding-top: 8px; margin-top: 8px; margin-bottom: 5px;
    }
    .chapter-divider:first-child { border-top: none; padding-top: 0; margin-top: 0; }

    /* ── COMPACT UNIT LIST ── */
    .unit-list { display: flex; flex-direction: column; gap: 3px; }
    .unit-item {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 7px;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      transition: all 0.18s;
      cursor: pointer; text-decoration: none; color: inherit;
    }
    .unit-item.no-quiz {
      border-style: dashed; border-width: 1px;
      cursor: default; opacity: 0.55;
    }
    .unit-item:not(.no-quiz):hover {
      border-color: var(--gc); background: var(--gcl);
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
    }
    .unit-item.done {
      border-style: solid; border-color: #10B981;
      background: #F0FDF4; opacity: 1;
    }
    .unit-num-badge {
      width: 24px; height: 24px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800;
      background: var(--gcl); color: var(--gc);
      flex-shrink: 0; transition: all 0.18s;
    }
    .unit-item.done .unit-num-badge { background: #10B981; color: white; }
    .unit-item.no-quiz .unit-num-badge { background: #F1F5F9; color: #94A3B8; }
    .unit-title {
      font-size: 12px; font-weight: 500; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text2);
    }
    .unit-item:not(.no-quiz):hover .unit-title { color: var(--text1); }
    .unit-item.done .unit-title { color: var(--text1); font-weight: 600; }
    .unit-check {
      width: 19px; height: 19px; border-radius: 50%;
      border: 2px solid #CBD5E1;
      background: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.18s;
      font-size: 10px; color: transparent;
    }
    .unit-check:hover { border-color: #10B981; background: #F0FDF4; color: #10B981; }
    .unit-item.done .unit-check { border-color: #10B981; background: #10B981; color: white; }

    /* ── HEADER WRONG-NOTE BUTTON ── */
    .group-title-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .header-wrong-btn {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
      background: rgba(255,255,255,0.45);
      border: 1.5px solid currentColor;
      text-decoration: none; transition: all 0.2s;
      white-space: nowrap; position: relative; z-index: 1;
      flex-shrink: 0;
    }
    .header-wrong-btn:hover { background: rgba(255,255,255,0.85); }

    /* ── YEAR SECTION (FINAL group) ── */
    .year-section {
      font-size: 11px; font-weight: 700;
      color: var(--text3); letter-spacing: 0.5px;
      padding: 8px 0 5px;
      border-bottom: 1px dashed var(--border);
      margin-bottom: 6px;
    }

    /* ── FOOTER ── */

      color: var(--text3); padding: 16px;
    }
    .reset-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 12px;
      font-size: 11px; color: var(--text3);
      cursor: pointer; font-family: inherit;
      transition: all 0.2s; margin-top: 8px;
    }
    .reset-btn:hover { border-color: #EF4444; color: #EF4444; }
  </style>
</head>

          { id: 'ex46', num: '46', title: '제46회 기출 복원 모의고사', link: null },
          { id: 'ex47', num: '47', title: '제47회 기출 복원 모의고사', link: null },
        ]
      }
    ]
  }
];

// ─────────────────────────────────────────────
//  PROGRESS STORAGE
// ─────────────────────────────────────────────
const STORAGE_KEY = 'adsp_progress';

function getProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function saveProgress(p) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

function toggleUnit(unitId) {
  const p = getProgress();
  p[unitId] = !p[unitId];
  saveProgress(p);
  updateUI(p);
}

function resetProgress() {
  if (confirm('모든 학습 진행 상황을 초기화하시겠습니까?')) {
    localStorage.removeItem(STORAGE_KEY);
    updateUI({});
  }
}

// ─────────────────────────────────────────────
//  WRONG ANSWER COUNT (for group footer)
// ─────────────────────────────────────────────
const UNIT_ANSWERS = {
  u01: [3,2,3,2,3,3,1,3,4,3,2,1,4,1,1,2,4,3],
  u02: [4,1,3,4,3,1,2,4,1,1,2,1,3,4,1,2,2]
};
const UNIT_Q_KEYS = { u01: 'adsp_u01_q', u02: 'adsp_u02_q' };

function getGroupWrongCount(groupId) {
  const g = GROUPS.find(x => x.id === groupId);
  if (!g || !g.chapters) return 0;
  const unitIds = g.chapters.flatMap(ch => ch.units.map(u => u.id));
  let count = 0;
  for (const uid of unitIds) {
    const answers = UNIT_ANSWERS[uid];
    if (!answers) continue;
    try {
      const qs = JSON.parse(localStorage.getItem(UNIT_Q_KEYS[uid]) || '{}');
      answers.forEach((ans, i) => {
        const sel = qs[`q${i+1}`];
        if (sel !== undefined && sel !== null && sel !== ans) count++;
      });
    } catch {}
  }
  return count;
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function getAllItems() {
  const items = [];
  for (const g of GROUPS) {
    if (g.chapters) {
      for (const ch of g.chapters)
        for (const u of ch.units) items.push(u.id);
    } else if (g.years) {
      for (const y of g.years)
        for (const e of y.exams) items.push(e.id);
    }
  }
  return items;
}

function groupTotalAndDone(g, progress) {
  let total = 0, done = 0;
  const collect = (arr) => { for (const i of arr) { total++; if (progress[i.id]) done++; } };
  if (g.chapters) for (const ch of g.chapters) collect(ch.units);
  else if (g.years) for (const y of g.years) collect(y.exams);
  return { total, done };
}

function makeSVGRing(done, total, color) {
  const r = 24, cx = 29, cy = 29;
  const circ = 2 * Math.PI * r;
  const pct = total === 0 ? 0 : done / total;
  const offset = circ * (1 - pct);
  return `<svg width="58" height="58" viewBox="0 0 58 58">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#E2E8F0" stroke-width="5"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"
      stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})"
      style="transition:stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1)"/>
  </svg>`;
}

function renderGroups(progress) {
  const grid = document.getElementById('groups-grid');
  grid.innerHTML = '';

  for (const g of GROUPS) {
    const { total, done } = groupTotalAndDone(g, progress);
    const pct = total === 0 ? 0 : Math.round(done / total * 100);

    const card = document.createElement('div');
    card.className = 'group-card';
    card.style.setProperty('--gc', g.color);
    card.style.setProperty('--gcl', g.lightColor);

    // Header
    const wrongCnt = getGroupWrongCount(g.id);
    const wrongBtnHtml = wrongCnt > 0
      ? `<a href="wrongnote.html?group=${g.id}" class="header-wrong-btn" style="color:${g.color}" title="오답 ${wrongCnt}개 · 다시 풀기" onclick="event.stopPropagation()">✕ 오답 ${wrongCnt}</a>`
      : '';
    const headerDiv = document.createElement('div');
    headerDiv.className = 'group-header';
    headerDiv.style.color = g.color;
    headerDiv.innerHTML = `
      <div class="bg-stripe" style="background:${g.color}"></div>
      <div class="group-icon-wrap">${g.icon}</div>
      <div class="group-title-area">
        <div class="group-subject-tag" style="color:${g.color}">${g.subject}</div>
        <div class="group-title-row">
          <h2 style="color:${g.color}">${g.title}</h2>
          ${wrongBtnHtml}
        </div>
      </div>
      <div class="group-ring-wrap">
        <div class="ring-container" id="ring-${g.id}">
          ${makeSVGRing(done, total, g.color)}
          <div class="ring-text">${pct}%</div>
        </div>
      </div>`;
    card.appendChild(headerDiv);

    // Body
    const bodyDiv = document.createElement('div');
    bodyDiv.className = 'group-body';

    if (g.chapters) {
      // Units with chapters
      const listDiv = document.createElement('div');
      listDiv.className = 'unit-list';
      g.chapters.forEach((ch, ci) => {
        const divLabel = document.createElement('div');
        divLabel.className = 'chapter-divider';
        divLabel.textContent = ch.label;
        listDiv.appendChild(divLabel);

        ch.units.forEach(u => {
          listDiv.appendChild(makeUnitItem(u, progress, g));
        });
      });
      bodyDiv.appendChild(listDiv);
    } else if (g.years) {
      // Final exams with years
      const listDiv = document.createElement('div');
      listDiv.className = 'unit-list';
      g.years.forEach(y => {
        const yearLabel = document.createElement('div');
        yearLabel.className = 'year-section';
        yearLabel.textContent = y.year;
        listDiv.appendChild(yearLabel);
        y.exams.forEach(e => {
          listDiv.appendChild(makeExamItem(e, progress, g));
        });
      });
      bodyDiv.appendChild(listDiv);
    }

    card.appendChild(bodyDiv);
    grid.appendChild(card);
  }
}

function makeUnitItem(u, progress, g) {
  const isDone = !!progress[u.id];
  const hasQuiz = !!u.link;
  const item = document.createElement('div');
  item.className = 'unit-item' + (isDone ? ' done' : '') + (hasQuiz ? '' : ' no-quiz');
  item.dataset.id = u.id;
  item.style.setProperty('--gc', g.color);
  item.style.setProperty('--gcl', g.lightColor);

  item.innerHTML = `
    <div class="unit-num-badge">${u.num}</div>
    <span class="unit-title">${u.title}</span>
    <button class="unit-check" title="완료 표시" onclick="event.stopPropagation();toggleUnit('${u.id}')">${isDone ? '✓' : ''}</button>`;

  if (hasQuiz) {
    item.onclick = (e) => {
      if (!e.target.classList.contains('unit-check')) window.location.href = u.link;
    };
  }
  return item;
}

function makeExamItem(e, progress, g) {
  const isDone = !!progress[e.id];
  const item = document.createElement('div');
  item.className = 'unit-item' + (isDone ? ' done' : '');
  item.dataset.id = e.id;
  item.style.setProperty('--gc', g.color);
  item.style.setProperty('--gcl', g.lightColor);

  item.className += ' no-quiz';
  item.innerHTML = `
    <div class="unit-num-badge">${e.num}회</div>
    <span class="unit-title">${e.title}</span>
    <button class="unit-check" title="완료 표시" onclick="event.stopPropagation();toggleUnit('${e.id}')">${isDone ? '✓' : ''}</button>`;

  return item;
}

function updateUI(progress) {
  if (!progress) progress = getProgress();

  // Update group cards
  renderGroups(progress);

  // Overall stats
  const allItems = getAllItems();
  const total = allItems.length;
  const done = allItems.filter(id => progress[id]).length;
  const pct = total === 0 ? 0 : Math.round(done / total * 100);

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-remain').textContent = total - done;
  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
updateUI(getProgress());
</script>
</body>
