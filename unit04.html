    .topbar-unit-label { font-size: 11px; font-weight: 700; color: var(--primary); letter-spacing: .5px; margin-bottom: 1px; }
    .topbar-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .topbar-progress .count { font-size: 20px; color: var(--primary); }
    .topbar-progbar-bg { background: #E2E8F0; border-radius: 4px; height: 5px; overflow: hidden; margin-top: 4px; min-width: 80px; }
    .topbar-progbar-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width .5s ease; }

    .q-card { background: var(--surface); border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.07); margin-bottom: 20px; overflow: hidden; border: 2px solid transparent; transition: border-color .3s; }

    .opt-num { width: 24px; height: 24px; border-radius: 6px; background: var(--border); color: var(--text3); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; transition: all .2s; }

// ─── STORAGE ─────────────────────────────────────────────
const STORAGE_KEY = 'adsp_progress';
const Q_STATE_KEY = 'adsp_u04_q';

function getProgress() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
function saveProgress(p) { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }
function getQState()   { try { return JSON.parse(localStorage.getItem(Q_STATE_KEY)   || '{}'); } catch { return {}; } }
function saveQState(s) { localStorage.setItem(Q_STATE_KEY, JSON.stringify(s)); }

// ─── RENDER ──────────────────────────────────────────────
const OPTS       = ['①','②','③','④'];
const DIFF_CLASS = { '하':'chip-diff-low','중':'chip-diff-mid','상':'chip-diff-high' };
const DIFF_TEXT  = { '하':'하(쉬움)','중':'중(보통)','상':'상(어려움)' };

function renderAll() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  const qState   = getQState();
  const progress = getProgress();

  questions.forEach(q => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `qcard-${q.id}`;

    const isDone   = !!progress[`u04_q${q.id}`];
    const answered = qState[`q${q.id}`];
    if (answered) card.classList.add(answered === q.answer ? 'answered-correct' : 'answered-wrong');

    const kwHtml    = q.keywords.map(k => `<span class="chip chip-kw">#${k}</span>`).join('');
    const doneBadge = isDone ? '<span class="chip chip-done">✓ 완료</span>' : '';
    const imageHtml = q.image
      ? `<div class="q-image"><img src="${q.image}" alt="문제 ${q.id} 다이어그램"
           onerror="this.parentElement.innerHTML='<div class=\'q-image-placeholder\'>🖼️ 이미지를 불러올 수 없습니다<br><small>${q.image}</small></div>'"></div>`
      : '';

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num-badge">${q.id}</div>
        <div class="q-meta">
          <div class="q-chips">
            <span class="chip ${DIFF_CLASS[q.difficulty]}">${DIFF_TEXT[q.difficulty]}</span>
            ${kwHtml} ${doneBadge}
          </div>
        </div>
      </div>
      <div class="q-text">${q.text.replace(/\n/g,'<br>')}</div>
      ${imageHtml}
      <div class="q-options" id="opts-${q.id}">
        ${q.options.map((opt,i) => `
          <button class="opt-btn" data-idx="${i+1}" onclick="selectOption(${q.id},${i+1})" ${answered?'disabled':''}>
            <span class="opt-num">${OPTS[i]}</span><span>${opt}</span>
          </button>`).join('')}
      </div>
      <div class="q-explanation ${answered?'show':''}" id="exp-${q.id}">
        <div class="explanation-label">📖 해설</div>
        <div class="explanation-text">${q.explanation.replace(/\n/g,'<br>')}</div>
      </div>
      <div class="q-footer">
        <button class="done-toggle ${isDone?'active':''}" id="done-btn-${q.id}" onclick="toggleDone(${q.id})">
          <span>${isDone?'✓':'○'}</span>
          <span>${isDone?'완료됨':'완료 표시'}</span>
        </button>
      </div>`;

    if (answered) {
      card.querySelector(`#opts-${q.id}`).querySelectorAll('.opt-btn').forEach(btn => {
        const idx = parseInt(btn.dataset.idx);
        if (idx === q.answer) btn.classList.add('show-correct');
        else if (idx === answered && answered !== q.answer) btn.classList.add('wrong');
        btn.disabled = true;
      });
    }

    container.appendChild(card);
  });

  updateProgress();
}

function selectOption(qId, idx) {
  const q      = questions.find(x => x.id === qId);
  const qState = getQState();
  qState[`q${qId}`] = idx;
  saveQState(qState);

  const card    = document.getElementById(`qcard-${qId}`);
  const optsDiv = document.getElementById(`opts-${qId}`);
  const expDiv  = document.getElementById(`exp-${qId}`);

  const isCorrect = idx === q.answer;
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  optsDiv.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled = true;
    const bIdx = parseInt(btn.dataset.idx);
    if (bIdx === q.answer) btn.classList.add('show-correct');
    else if (bIdx === idx && !isCorrect) btn.classList.add('wrong');
  });
  expDiv.classList.add('show');

  if (isCorrect) {
    const p = getProgress();
    p[`u04_q${qId}`] = true;
    saveProgress(p);
    const doneBtn = document.getElementById(`done-btn-${qId}`);
    doneBtn.classList.add('active');
    doneBtn.innerHTML = '<span>✓</span><span>완료됨</span>';
    const meta = card.querySelector('.q-meta .q-chips');
    if (!meta.querySelector('.chip-done'))
      meta.insertAdjacentHTML('beforeend', '<span class="chip chip-done">✓ 완료</span>');
  }
  updateProgress();
}

function toggleDone(qId) {
  const p   = getProgress();
  const key = `u04_q${qId}`;
  p[key]    = !p[key];
  saveProgress(p);

  const isDone  = p[key];
  const doneBtn = document.getElementById(`done-btn-${qId}`);
  doneBtn.classList.toggle('active', isDone);
  doneBtn.innerHTML = `<span>${isDone?'✓':'○'}</span><span>${isDone?'완료됨':'완료 표시'}</span>`;

  const card     = document.getElementById(`qcard-${qId}`);
  const meta     = card.querySelector('.q-meta .q-chips');
  const existing = meta.querySelector('.chip-done');
  if (isDone && !existing)  meta.insertAdjacentHTML('beforeend','<span class="chip chip-done">✓ 완료</span>');
  else if (!isDone && existing) existing.remove();

  updateProgress();
}

function updateProgress() {
  const p  = getProgress();
  let done = 0;
  if (p['u04_q1']) done++; if (p['u04_q2']) done++; if (p['u04_q3']) done++; if (p['u04_q4']) done++; if (p['u04_q5']) done++; if (p['u04_q6']) done++; if (p['u04_q7']) done++; if (p['u04_q8']) done++; if (p['u04_q9']) done++; if (p['u04_q10']) done++; if (p['u04_q11']) done++;
  document.getElementById('done-count').textContent = done;
  document.getElementById('top-progbar').style.width = (done / TOTAL * 100) + '%';

  const qs = getQState();
  let w = 0;
  const s1=qs[`q1`]; if(s1!=null&&s1!==questions[0].answer) w++; const s2=qs[`q2`]; if(s2!=null&&s2!==questions[1].answer) w++; const s3=qs[`q3`]; if(s3!=null&&s3!==questions[2].answer) w++; const s4=qs[`q4`]; if(s4!=null&&s4!==questions[3].answer) w++; const s5=qs[`q5`]; if(s5!=null&&s5!==questions[4].answer) w++; const s6=qs[`q6`]; if(s6!=null&&s6!==questions[5].answer) w++; const s7=qs[`q7`]; if(s7!=null&&s7!==questions[6].answer) w++; const s8=qs[`q8`]; if(s8!=null&&s8!==questions[7].answer) w++; const s9=qs[`q9`]; if(s9!=null&&s9!==questions[8].answer) w++; const s10=qs[`q10`]; if(s10!=null&&s10!==questions[9].answer) w++; const s11=qs[`q11`]; if(s11!=null&&s11!==questions[10].answer) w++;
  const wnBtn = document.getElementById('wrong-note-btn');
  document.getElementById('wrong-note-cnt').textContent = w;
  wnBtn.style.display = w > 0 ? 'flex' : 'none';

  if (done === TOTAL) {
    p['u04'] = true;
    saveProgress(p);
    document.getElementById('complete-banner').classList.add('show');
    document.getElementById('complete-banner').scrollIntoView({ behavior:'smooth', block:'start' });
  } else {
    document.getElementById('complete-banner').classList.remove('show');
  }
}

function resetQuiz() {
  if (!confirm('Unit 04의 모든 풀이 기록을 초기화하시겠습니까?\n(진행률과 오답 기록이 모두 삭제됩니다)')) return;
  localStorage.removeItem(Q_STATE_KEY);
  const p = getProgress();
  delete p['u04_q1'];
  delete p['u04_q2'];
  delete p['u04_q3'];
  delete p['u04_q4'];
  delete p['u04_q5'];
  delete p['u04_q6'];
  delete p['u04_q7'];
  delete p['u04_q8'];
  delete p['u04_q9'];
  delete p['u04_q10'];
  delete p['u04_q11'];
  delete p['u04'];
  saveProgress(p);
  try {
    const retry = JSON.parse(localStorage.getItem('adsp_retry') || '{}');
  delete     delete retry['u04_q1'];;
  delete     delete retry['u04_q2'];;
  delete     delete retry['u04_q3'];;
  delete     delete retry['u04_q4'];;
  delete     delete retry['u04_q5'];;
  delete     delete retry['u04_q6'];;
  delete     delete retry['u04_q7'];;
  delete     delete retry['u04_q8'];;
  delete     delete retry['u04_q9'];;
  delete     delete retry['u04_q10'];;
  delete     delete retry['u04_q11'];;
    localStorage.setItem('adsp_retry', JSON.stringify(retry));
  } catch {}
  renderAll();
}

// ─── INIT ─────────────────────────────────────────────────
renderAll();
</script>
